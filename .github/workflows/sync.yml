name: Auto Sync README

on:
  push:
    branches:
      - main  # 當你推送到 main 分支時觸發

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 給予自動同步腳本寫入權限
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 💡 升級到 v4，避免舊版 node 警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 💡 升級到 v5，速度更快且相容新版 Python
        with:
          python-version: '3.x' 

      - name: Run sync script
        run: python sync_all.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 1. 檢查是否有更動
          if [ -n "$(git status --porcelain)" ]; then
            # 2. 先把 sync_all.py 改好的 README 暫存起來（變成 staged）
            git add .
            
            # 3. ⚡ 這時候再 pull --rebase 就百分之百不會被 Git 擋下來了！
            git pull --rebase origin main
            
            # 4. 提交並推上雲端
            git commit -m "chore(sync): auto-update README index [skip ci]"
            git push origin main
          else
            echo "No changes detected, skipping commit."
          fi
